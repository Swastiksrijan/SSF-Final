services:
  - type: web
    name: "ngo-backend"
    env: "node"
    plan: "free"
    rootDir: "backend_node"
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: "PORT"
        value: "5000"
      - key: "DB_URL"
        fromDatabase:
          name: "ngo-db"
          property: "connectionString"

databases:
  - name: "ngo-db"
    plan: "free"
    databaseName: "ngo_db"
    user: "ngo_user"
